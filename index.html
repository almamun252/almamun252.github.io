<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdullah Al Mamun | Coming Soon</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #334155;
        }
        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 90%;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }
        h1 {
            font-size: 2.2em;
            color: #0f172a;
            margin: 0 0 15px 0;
        }
        p {
            font-size: 1.1em;
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn {
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.95em;
        }
        .btn-app { background: #10b981; }
        .btn-app:hover { background: #059669; transform: translateY(-2px); }
        .btn-course { background: #3b82f6; }
        .btn-course:hover { background: #2563eb; transform: translateY(-2px); }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚀</div>
        <h1>Coming Soon...</h1>
        <p>আমার পোর্টফোলিও ওয়েবসাইটের কাজ চলছে! খুব শিগগিরই এটি লাইভ হবে। আপাতত আমার প্রজেক্টগুলো নিচে থেকে দেখতে পারেন:</p>
        
        <div class="links">
            <a href="/nikhut-hisab" class="btn btn-app">📱 Nikhut Hisab</a>
            <a href="/video-editing-course" class="btn btn-course">🎬 Video Course</a>
        </div>
    </div>
</body>
</html>
